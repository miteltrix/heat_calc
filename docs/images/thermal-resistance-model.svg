<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Thermal resistance model</title>
  <desc id="desc">Diagram showing internal convection, pipe wall conduction, and outside convection or solid conduction as thermal resistances in series.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f4c49"/>
    </marker>
  </defs>
  <rect width="1100" height="520" fill="#f7faf8"/>
  <text x="48" y="58" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#18201f">Overall coefficient from resistances</text>
  <text x="48" y="90" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#50605c">The calculator builds U from the series resistance between the tank side and the pipe fluid.</text>

  <line x1="85" y1="250" x2="1015" y2="250" stroke="#0f4c49" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="95" cy="250" r="16" fill="#d5673f"/>
  <circle cx="1005" cy="250" r="16" fill="#2f5f94"/>
  <text x="52" y="220" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#a94442">Tank</text>
  <text x="948" y="220" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#2f5f94">Fluid</text>

  <rect x="170" y="175" width="220" height="150" rx="8" fill="#ffffff" stroke="#d6ddda" stroke-width="2"/>
  <text x="195" y="212" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#18201f">Outside side</text>
  <text x="195" y="250" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">Fluid: 1 / (alpha_o * A_o)</text>
  <text x="195" y="282" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">Solid: ln(D_s/D_o)</text>
  <text x="245" y="310" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">/ (2*pi*k_s*L)</text>

  <rect x="440" y="175" width="220" height="150" rx="8" fill="#ffffff" stroke="#d6ddda" stroke-width="2"/>
  <text x="485" y="212" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#18201f">Pipe wall</text>
  <text x="472" y="258" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">R_wall = ln(D_o/D_i)</text>
  <text x="486" y="290" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">/ (2*pi*k_pipe*L)</text>

  <rect x="710" y="175" width="220" height="150" rx="8" fill="#ffffff" stroke="#d6ddda" stroke-width="2"/>
  <text x="750" y="212" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#18201f">Inside fluid</text>
  <text x="748" y="266" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">R_inside = 1 /</text>
  <text x="758" y="298" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#18201f">(alpha_i * A_i)</text>

  <rect x="130" y="385" width="840" height="82" rx="8" fill="#edf3ef" stroke="#d6ddda"/>
  <text x="160" y="420" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f4c49">R_total = R_outside + R_wall + R_inside</text>
  <text x="160" y="452" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f4c49">U = 1 / (R_total * A_o),  and  U*A_o = 1 / R_total</text>
</svg>
