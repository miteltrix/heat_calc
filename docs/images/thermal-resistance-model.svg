<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Thermal resistance chain</title>
  <desc id="desc">Human friendly diagram of the three thermal resistance parts: outside medium, pipe wall, and inside fluid film.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#176d69"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#18201f" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="#f6faf8"/>
  <text x="60" y="64" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#18201f">Thermal resistance chain</text>
  <text x="60" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#50605c">Heat passes through three barriers before it reaches the moving fluid.</text>

  <line x1="92" y1="310" x2="1102" y2="310" stroke="#176d69" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="82" y="270" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#a94442">Hot tank</text>
  <text x="1010" y="270" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#2f5f94">Pipe fluid</text>

  <rect x="140" y="185" width="250" height="210" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="232" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">1. Outside medium</text>
  <text x="170" y="272" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">Fluid around pipe:</text>
  <text x="170" y="302" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">convection film</text>
  <text x="170" y="342" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">Solid around pipe:</text>
  <text x="170" y="372" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">conduction layer</text>

  <rect x="475" y="185" width="250" height="210" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="505" y="232" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">2. Pipe wall</text>
  <text x="505" y="276" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">Depends on:</text>
  <text x="505" y="312" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">wall thickness</text>
  <text x="505" y="346" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">pipe conductivity</text>

  <rect x="810" y="185" width="250" height="210" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="840" y="232" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">3. Inside fluid</text>
  <text x="840" y="276" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">Depends on:</text>
  <text x="840" y="312" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">flow speed</text>
  <text x="840" y="346" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">fluid properties</text>

  <rect x="140" y="455" width="920" height="98" rx="16" fill="#edf3ef" stroke="#d6ddda"/>
  <text x="180" y="500" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f4c49">Lower total resistance means better heat transfer.</text>
  <text x="180" y="535" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#18201f">The calculator converts this resistance chain into the overall coefficient U.</text>
</svg>
