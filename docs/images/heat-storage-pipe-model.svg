<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Pipe in a hot storage tank</title>
  <desc id="desc">Friendly schematic of a pipe inside a hot storage tank. Fluid enters cold, leaves warmer, and heat moves from the tank through the pipe wall into the fluid.</desc>
  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#176d69"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c18422"/>
    </marker>
    <linearGradient id="water" x1="0" x2="1">
      <stop offset="0" stop-color="#2f5f94"/>
      <stop offset="1" stop-color="#d5673f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#18201f" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="#f6faf8"/>
  <text x="60" y="64" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#18201f">Heat storage pipe model</text>
  <text x="60" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#50605c">The storage tank is the hot boundary. The fluid gains heat while it flows through the pipe.</text>

  <rect x="76" y="150" width="800" height="310" rx="18" fill="#dfeee8" stroke="#93aaa3" stroke-width="3" filter="url(#shadow)"/>
  <text x="112" y="198" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#0f4c49">Hot storage tank</text>
  <text x="112" y="232" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#18201f">Tank is checked at maximum temperature:</text>
  <text x="112" y="263" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">T<tspan baseline-shift="sub" font-size="15">tank,max</tspan></text>

  <line x1="160" y1="345" x2="790" y2="345" stroke="#7c8582" stroke-width="62" stroke-linecap="round"/>
  <line x1="160" y1="345" x2="790" y2="345" stroke="url(#water)" stroke-width="38" stroke-linecap="round"/>

  <line x1="36" y1="345" x2="138" y2="345" stroke="#2f5f94" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
  <line x1="812" y1="345" x2="940" y2="345" stroke="#d5673f" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow-teal)"/>

  <text x="52" y="316" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#2f5f94">Fluid in</text>
  <text x="54" y="392" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">T<tspan baseline-shift="sub" font-size="15">in</tspan></text>
  <text x="846" y="316" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#a94442">Fluid out</text>
  <text x="852" y="392" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">T<tspan baseline-shift="sub" font-size="15">out</tspan></text>

  <path d="M 390 285 C 430 230, 520 230, 560 285" fill="none" stroke="#c18422" stroke-width="5" marker-end="url(#arrow-gold)"/>
  <text x="412" y="235" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#915d13">heat moves into the fluid</text>

  <rect x="925" y="150" width="215" height="310" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="954" y="194" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">Two checks</text>
  <circle cx="970" cy="240" r="15" fill="#176d69"/>
  <text x="966" y="247" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
  <text x="996" y="236" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#18201f">Pipe can</text>
  <text x="996" y="261" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">transfer Q</text>
  <circle cx="970" cy="325" r="15" fill="#176d69"/>
  <text x="966" y="332" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
  <text x="996" y="321" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#18201f">Fluid can</text>
  <text x="996" y="346" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">absorb Q</text>

  <rect x="76" y="500" width="1064" height="78" rx="14" fill="#ffffff" stroke="#d6ddda"/>
  <text x="110" y="548" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0f4c49">Main idea:</text>
  <text x="230" y="548" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#18201f">make the pipe long enough, or the flow fast enough, to reach the wanted heat transfer.</text>
</svg>
