<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">From flow data to heat transfer coefficient</title>
  <desc id="desc">Friendly workflow showing how fluid properties and velocity are converted to Reynolds number, Prandtl number, Nusselt number, alpha, U, and heat transfer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#176d69"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#18201f" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="#f6faf8"/>
  <text x="60" y="64" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#18201f">From flow data to heat transfer</text>
  <text x="60" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#50605c">If alpha is not typed manually, the app estimates it from common pipe-flow correlations.</text>

  <rect x="70" y="155" width="230" height="190" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="198" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">1. User inputs</text>
  <text x="100" y="236" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">velocity</text>
  <text x="100" y="266" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">diameter</text>
  <text x="100" y="296" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">density, viscosity</text>
  <text x="100" y="326" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">cp and conductivity</text>

  <line x1="300" y1="250" x2="360" y2="250" stroke="#176d69" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="370" y="155" width="230" height="190" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="198" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">2. Flow numbers</text>
  <text x="400" y="242" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">Reynolds</text>
  <text x="400" y="272" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#50605c">laminar or turbulent?</text>
  <text x="400" y="316" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">Prandtl</text>
  <text x="400" y="346" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#50605c">heat vs momentum diffusion</text>

  <line x1="600" y1="250" x2="660" y2="250" stroke="#176d69" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="670" y="155" width="230" height="190" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="198" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">3. Nusselt</text>
  <text x="700" y="242" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">Chooses a correlation</text>
  <text x="700" y="275" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">Nu</text>
  <text x="740" y="275" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">means:</text>
  <text x="700" y="308" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">how strong convection</text>
  <text x="700" y="336" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">is compared with conduction</text>

  <line x1="900" y1="250" x2="960" y2="250" stroke="#176d69" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="970" y="155" width="170" height="190" rx="16" fill="#ffffff" stroke="#d6ddda" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="198" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#18201f">4. Alpha</text>
  <text x="1000" y="244" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f4c49">alpha</text>
  <text x="1000" y="276" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">W/m2 K</text>
  <text x="1000" y="316" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">fluid film</text>
  <text x="1000" y="344" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#50605c">coefficient</text>

  <rect x="160" y="455" width="880" height="115" rx="18" fill="#edf3ef" stroke="#d6ddda"/>
  <text x="205" y="502" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f4c49">Then alpha goes into the resistance model.</text>
  <text x="205" y="540" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#18201f">Resistance model gives U. Then Q = U * A * LMTD.</text>
</svg>
